<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Ledger — Tasks & Habits</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:'Fraunces', serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --coral:#FF6B52;
    --sage:#4C9A6A;
    --gold:#F2A93B;
    --blue:#5B8DEF;
    --purple:#C15FFF;
    --teal:#2FBFC4;
    --pink:#FF4FA0;
    --radius:16px;
  }
  html[data-theme="light"]{
    --bg: var(--tg-theme-bg-color, #F7F5F0);
    --surface: var(--tg-theme-secondary-bg-color, #FFFFFF);
    --surface-2: var(--tg-theme-section-bg-color, #EFEBE2);
    --ink: var(--tg-theme-text-color, #1C1E21);
    --hint: var(--tg-theme-hint-color, #8B8F98);
    --line: rgba(28,30,33,0.09);
    --accent: var(--tg-theme-button-color, #5B8DEF);
    --accent-text: var(--tg-theme-button-text-color, #FFFFFF);
    --accent-ink:#16233F;
  }
  html[data-theme="dark"]{
    --bg: var(--tg-theme-bg-color, #14171C);
    --surface: var(--tg-theme-secondary-bg-color, #1C2027);
    --surface-2: var(--tg-theme-section-bg-color, #242933);
    --ink: var(--tg-theme-text-color, #EDEEF1);
    --hint: var(--tg-theme-hint-color, #8B93A1);
    --line: rgba(237,238,241,0.09);
    --accent: var(--tg-theme-button-color, #6C9BFF);
    --accent-text: var(--tg-theme-button-text-color, #FFFFFF);
    --accent-ink:#16233F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-body);
    padding-bottom:96px;
    min-height:100vh;
  }
  .wrap{max-width:520px; margin:0 auto; padding:20px 18px 8px;}

  /* Header */
  .greeting{font-family:var(--font-display); font-style:italic; font-weight:500; font-size:15px; color:var(--hint); margin:0 0 2px;}
  .date{font-family:var(--font-display); font-weight:600; font-size:26px; margin:0 0 20px; letter-spacing:-0.01em;}

  .ring-row{display:flex; align-items:center; gap:18px; margin-bottom:24px;}
  .ring-wrap{position:relative; width:104px; height:104px; flex-shrink:0;}
  .ring-wrap svg{width:100%; height:100%;}
  .tick{stroke:var(--line); stroke-width:2.8; stroke-linecap:round; transition:stroke .25s ease;}
  .ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring-num{font-family:var(--font-mono); font-size:19px; font-weight:500;}
  .ring-label{font-family:var(--font-display); font-style:italic; font-size:11px; color:var(--hint); margin-top:1px;}
  .ring-copy{flex:1;}
  .ring-copy .h{font-weight:600; font-size:15px; margin:0 0 4px;}
  .ring-copy .p{font-size:13px; color:var(--hint); margin:0; line-height:1.45;}

  /* Tabs */
  .tabs{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; margin-bottom:20px; gap:2px;}
  .tab{flex:1; text-align:center; padding:11px 4px; font-size:12.5px; font-weight:700; border-radius:11px; cursor:pointer; color:var(--hint); user-select:none; display:flex; flex-direction:column; align-items:center; gap:4px; transition:.15s ease;}
  .tab svg{width:19px; height:19px;}
  .tab.active{background:var(--surface-2); box-shadow:none; color:var(--accent);}

  /* List */
  .list{display:flex; flex-direction:column; gap:10px;}
  .empty{padding:36px 12px; text-align:center;}
  .empty .e-title{font-family:var(--font-display); font-style:italic; font-size:17px; margin:0 0 6px;}
  .empty .e-body{font-size:13px; color:var(--hint); margin:0;}

  .card{background:var(--surface); border-radius:var(--radius); padding:14px 14px 14px 12px; display:flex; align-items:flex-start; gap:12px; border:1px solid var(--line); border-left:4px solid var(--card-accent, var(--line));}
  .check{
    width:27px; height:27px; border-radius:50%; border:2.5px solid var(--line); flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s ease;
  }
  .check.done{background:var(--sage); border-color:var(--sage);}
  .check svg{width:14px; height:14px; opacity:0; transition:.15s ease;}
  .check.done svg{opacity:1;}
  .card-body{flex:1; min-width:0; cursor:default;}
  .card-title{font-size:14.5px; font-weight:500; line-height:1.35; word-break:break-word;}
  .card-title.done{text-decoration:line-through; color:var(--hint);}
  .card-notes{font-size:12.5px; color:var(--hint); margin-top:5px; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer;}
  .card-notes.expanded{-webkit-line-clamp:unset; display:block;}
  .meta-row{display:flex; align-items:center; gap:8px; margin-top:7px;}
  .prio-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .prio-low{background:var(--sage);}
  .prio-med{background:var(--gold);}
  .prio-high{background:var(--coral);}
  .due{font-family:var(--font-mono); font-size:11px; color:var(--hint);}
  .due.overdue{color:var(--coral); font-weight:500;}
  .del{width:34px; height:34px; flex-shrink:0; border:none; background:transparent; color:var(--hint); cursor:pointer; opacity:.7; display:flex; align-items:center; justify-content:center; border-radius:8px;}
  .del:active{background:var(--surface-2); opacity:1;}
  .del svg{width:16px; height:16px;}

  /* Habit card */
  .habit-top{display:flex; align-items:center; justify-content:space-between; width:100%; gap:8px;}
  .habit-name-row{display:flex; align-items:center; gap:8px; min-width:0;}
  .habit-swatch{width:9px; height:9px; border-radius:50%; flex-shrink:0; background:var(--card-accent);}
  .streak{display:flex; align-items:baseline; gap:4px; font-family:var(--font-mono); font-size:11.5px; color:var(--hint); white-space:nowrap;}
  .streak b{color:#fff; background:var(--card-accent); padding:2px 7px; border-radius:8px; font-size:11px; font-weight:600;}
  .habit-notes{font-size:12.5px; color:var(--hint); margin-top:6px; line-height:1.4;}
  .ribbon{display:flex; gap:6px; margin-top:14px;}
  .dot{width:100%; aspect-ratio:1; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative;}
  .dot.on{background:var(--card-accent); border-color:var(--card-accent);}
  .dot.today{box-shadow:0 0 0 2px var(--ink) inset;}
  .dot-label{position:absolute; bottom:-16px; font-family:var(--font-mono); font-size:9px; color:var(--hint); left:50%; transform:translateX(-50%);}
  .habit-row{flex-direction:column; align-items:stretch;}
  .ribbon-wrap{padding-bottom:14px;}

  /* History tab */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;}
  .stat-tile{border-radius:14px; padding:14px; border:1px solid var(--line); background:var(--tile-bg, var(--surface));}
  .stat-num{font-family:var(--font-mono); font-size:20px; font-weight:500; color:var(--tile-fg, var(--ink));}
  .stat-label{font-size:11.5px; color:var(--hint); margin-top:3px; line-height:1.3;}
  .hist-block{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .hist-block h3{font-family:var(--font-display); font-weight:600; font-size:15px; margin:0 0 12px;}
  .heatmap{display:flex; gap:3px; overflow-x:auto; padding-bottom:2px;}
  .heat-col{display:flex; flex-direction:column; gap:3px;}
  .heat-cell{width:11px; height:11px; border-radius:3px; background:var(--surface-2);}
  .heat-legend{display:flex; align-items:center; gap:5px; margin-top:10px; font-size:10.5px; color:var(--hint); font-family:var(--font-mono);}
  .heat-legend .heat-cell{width:9px; height:9px;}
  .habit-hist-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line);}
  .habit-hist-row:first-child{border-top:none;}
  .hh-name{flex:1; min-width:0; font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hh-strip{display:flex; gap:2.5px;}
  .hh-dot{width:8px; height:8px; border-radius:2px; background:var(--surface-2);}
  .hh-streak{font-family:var(--font-mono); font-size:11px; color:var(--hint); width:52px; text-align:right; flex-shrink:0;}

  /* Sheet */
  .backdrop{position:fixed; inset:0; background:rgba(10,12,16,0.45); opacity:0; pointer-events:none; transition:.2s ease; z-index:10;}
  .backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; background:var(--surface);
    border-radius:22px 22px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(105%); transition:transform .28s cubic-bezier(.32,.72,0,1); z-index:11;
    max-width:520px; margin:0 auto; max-height:88vh; overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-title{font-family:var(--font-display); font-weight:600; font-size:19px; margin:0 0 16px;}
  .field-label{font-size:12px; font-weight:600; color:var(--hint); text-transform:uppercase; letter-spacing:.03em; margin:14px 0 6px;}
  .field-label:first-of-type{margin-top:0;}
  input[type="text"], input[type="date"], textarea{
    width:100%; border:1px solid var(--line); background:var(--surface-2); color:var(--ink);
    border-radius:10px; padding:11px 12px; font-size:14.5px; font-family:var(--font-body); outline:none; resize:none;
  }
  textarea{min-height:64px; line-height:1.4;}
  input:focus, textarea:focus{border-color:var(--hint);}
  .pill-row{display:flex; gap:8px;}
  .pill{flex:1; text-align:center; padding:12px 0; border-radius:11px; border:1.5px solid var(--line); font-size:13.5px; font-weight:700; color:var(--hint); cursor:pointer;}
  .pill.sel-low.sel{background:var(--sage); color:#fff; border-color:var(--sage);}
  .pill.sel-med.sel{background:var(--gold); color:#fff; border-color:var(--gold);}
  .pill.sel-high.sel{background:var(--coral); color:#fff; border-color:var(--coral);}
  .sheet-actions{display:flex; gap:10px; margin-top:22px;}
  .btn{flex:1; text-align:center; padding:15px 0; border-radius:13px; font-size:15px; font-weight:700; border:none; cursor:pointer;}
  .btn-cancel{background:var(--surface-2); color:var(--ink);}
  .btn-save{background:var(--accent); color:var(--accent-text);}

  .fab{
    position:fixed; right:20px; bottom:calc(20px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:var(--accent-text); border:none; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(91,141,239,0.35); cursor:pointer; z-index:5; transition:transform .15s ease;
  }
  .fab:active{transform:scale(0.93);}
  .fab svg{width:23px; height:23px;}
  section{display:none;}
  section.active{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <p class="greeting" id="greeting">Good day</p>
  <h1 class="date" id="dateLabel"></h1>

  <div class="ring-row">
    <div class="ring-wrap">
      <svg viewBox="0 0 104 104" id="ringSvg"></svg>
      <div class="ring-center">
        <div class="ring-num" id="ringNum">0/0</div>
        <div class="ring-label">today</div>
      </div>
    </div>
    <div class="ring-copy">
      <p class="h" id="ringHeadline">Nothing due yet</p>
      <p class="p" id="ringSub">Add a task or a habit to start today's ledger.</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Tasks</span>
    </div>
    <div class="tab" data-tab="habits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      <span>Habits</span>
    </div>
    <div class="tab" data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
      <span>History</span>
    </div>
  </div>

  <section id="tasksSection" class="active">
    <div class="list" id="tasksList"></div>
  </section>

  <section id="habitsSection">
    <div class="list" id="habitsList"></div>
  </section>

  <section id="historySection">
    <div class="stat-grid" id="statGrid"></div>
    <div class="hist-block">
      <h3>Last 10 weeks</h3>
      <div class="heatmap" id="heatmap"></div>
      <div class="heat-legend">
        <span>less</span>
        <div class="heat-cell" id="lg0"></div>
        <div class="heat-cell" id="lg1"></div>
        <div class="heat-cell" id="lg2"></div>
        <div class="heat-cell" id="lg3"></div>
        <span>more</span>
      </div>
    </div>
    <div class="hist-block" id="habitHistBlock">
      <h3>Habit streaks</h3>
      <div id="habitHistList"></div>
    </div>
  </section>
</div>

<button class="fab" id="fab" aria-label="Add">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <h2 class="sheet-title" id="sheetTitle">New task</h2>

  <div class="field-label">Title</div>
  <input type="text" id="titleInput" placeholder="What needs doing?" maxlength="120">

  <div class="field-label">Details <span style="text-transform:none; font-weight:400;">(optional)</span></div>
  <textarea id="notesInput" placeholder="Add a description, context, or reminder to yourself…" maxlength="500"></textarea>

  <div id="taskFields">
    <div class="field-label">Priority</div>
    <div class="pill-row" id="prioRow">
      <div class="pill sel-low sel" data-p="low">Low</div>
      <div class="pill sel-med" data-p="med">Medium</div>
      <div class="pill sel-high" data-p="high">High</div>
    </div>
    <div class="field-label">Due date <span style="text-transform:none; font-weight:400;">(optional)</span></div>
    <input type="date" id="dueInput">
  </div>

  <div class="sheet-actions">
    <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
    <button class="btn btn-save" id="saveBtn">Save</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  if(tg){ tg.ready(); tg.expand(); }

  var HABIT_COLORS = ['#5B8DEF','#4C9A6A','#F2A93B','#FF6B52','#2FBFC4','#C15FFF'];
  var PRIO_COLORS = { low:'#4C9A6A', med:'#F2A93B', high:'#FF6B52' };
  var RING_STOPS = ['#4C9A6A','#5B8DEF'];
  var HEAT_STOPS = ['#2A3A55','#3F5C8A','#4E77C2','#5B8DEF'];

  /* ---------- theme ---------- */
  function applyTheme(){
    var scheme = 'light';
    if(tg && tg.colorScheme){ scheme = tg.colorScheme; }
    else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){ scheme = 'dark'; }
    document.documentElement.setAttribute('data-theme', scheme);
    if(tg){
      var bg = (tg.themeParams && tg.themeParams.bg_color) ? tg.themeParams.bg_color : (scheme === 'dark' ? '#14171C' : '#F7F5F0');
      try{ tg.setHeaderColor(bg); tg.setBackgroundColor(bg); }catch(e){}
    }
  }
  applyTheme();
  if(tg && tg.onEvent){ tg.onEvent('themeChanged', applyTheme); }

  function haptic(type){
    if(!tg || !tg.HapticFeedback) return;
    if(type === 'success' || type === 'error' || type === 'warning'){ tg.HapticFeedback.notificationOccurred(type); }
    else { tg.HapticFeedback.impactOccurred(type || 'light'); }
  }

  /* ---------- color helpers ---------- */
  function hexToRgb(hex){
    var h = hex.replace('#','');
    return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
  }
  function rgbToHex(r,g,b){
    return '#' + [r,g,b].map(function(v){ return Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0'); }).join('');
  }
  function lerpColor(c1,c2,t){
    var a=hexToRgb(c1), b=hexToRgb(c2);
    return rgbToHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
  }
  function multiStop(stops, t){
    t = Math.max(0, Math.min(1, t));
    var n = stops.length - 1;
    var seg = t * n;
    var i = Math.min(Math.floor(seg), n-1);
    var localT = seg - i;
    return lerpColor(stops[i], stops[i+1], localT);
  }

  /* ---------- storage ---------- */
  var DATA_KEY = 'ledger_data_v2';
  var Storage = {
    isTG: !!(tg && tg.CloudStorage),
    get: function(key){
      var self = this;
      return new Promise(function(resolve){
        if(self.isTG){
          tg.CloudStorage.getItem(key, function(err, value){ resolve(err ? null : value); });
        } else {
          try{ resolve(localStorage.getItem(key)); }catch(e){ resolve(null); }
        }
      });
    },
    set: function(key, value){
      var self = this;
      return new Promise(function(resolve){
        if(self.isTG){
          tg.CloudStorage.setItem(key, value, function(err, ok){ resolve(!err); });
        } else {
          try{ localStorage.setItem(key, value); }catch(e){}
          resolve(true);
        }
      });
    }
  };

  var data = { tasks: [], habits: [] };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function fmtKey(d){
    var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), day=('0'+d.getDate()).slice(-2);
    return y+'-'+m+'-'+day;
  }
  var TODAY = new Date();
  var TODAY_KEY = fmtKey(TODAY);

  function saveData(){ Storage.set(DATA_KEY, JSON.stringify(data)); }

  function loadData(){
    return Storage.get(DATA_KEY).then(function(raw){
      if(raw){
        try{ data = JSON.parse(raw); }catch(e){ data = {tasks:[], habits:[]}; }
      }
      if(!data.tasks) data.tasks = [];
      if(!data.habits) data.habits = [];
      data.habits.forEach(function(h, i){ if(!h.color) h.color = HABIT_COLORS[i % HABIT_COLORS.length]; });
    });
  }

  /* ---------- header ---------- */
  function renderHeader(){
    var hour = new Date().getHours();
    var g = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = g;
    document.getElementById('dateLabel').textContent = TODAY.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
  }

  /* ---------- ring ---------- */
  var TICKS = 30;
  function buildRing(){
    var svg = document.getElementById('ringSvg');
    var cx=52, cy=52, rOuter=46, rInner=38;
    var html = '';
    for(var i=0;i<TICKS;i++){
      var a = (i / TICKS) * Math.PI * 2 - Math.PI/2;
      var x1 = cx + rInner*Math.cos(a), y1 = cy + rInner*Math.sin(a);
      var x2 = cx + rOuter*Math.cos(a), y2 = cy + rOuter*Math.sin(a);
      html += '<line class="tick" data-i="'+i+'" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';
    }
    svg.innerHTML = html;
  }

  function renderRing(){
    var tasksDueToday = data.tasks.filter(function(t){ return t.due === TODAY_KEY; }).length;
    var tasksDoneToday = data.tasks.filter(function(t){ return t.due === TODAY_KEY && t.done; }).length;
    var habitsTotal = data.habits.length;
    var habitsDone = data.habits.filter(function(h){ return h.history[TODAY_KEY]; }).length;

    var total = tasksDueToday + habitsTotal;
    var done = tasksDoneToday + habitsDone;
    var ratio = total > 0 ? done/total : 0;
    var filled = Math.round(ratio * TICKS);

    document.querySelectorAll('.tick').forEach(function(t){
      var i = parseInt(t.getAttribute('data-i'),10);
      var isFilled = i < filled;
      if(isFilled){
        t.style.stroke = multiStop(RING_STOPS, i/(TICKS-1));
      } else {
        t.style.stroke = '';
      }
    });
    document.getElementById('ringNum').textContent = done + '/' + total;

    var headline = document.getElementById('ringHeadline');
    var sub = document.getElementById('ringSub');
    if(total === 0){
      headline.textContent = 'Nothing due yet';
      sub.textContent = 'Add a task or a habit to start today\'s ledger.';
    } else if(done === total){
      headline.textContent = 'Today is closed out';
      sub.textContent = 'Every task and habit for today is checked off.';
    } else {
      headline.textContent = (total-done) + ' left for today';
      sub.textContent = 'Tap a task or a habit\'s dot to mark it done.';
    }
  }

  /* ---------- tasks ---------- */
  function renderTasks(){
    var list = document.getElementById('tasksList');
    if(data.tasks.length === 0){
      list.innerHTML = '<div class="empty"><p class="e-title">The page is blank</p><p class="e-body">Add your first task and it will show up here.</p></div>';
      return;
    }
    var sorted = data.tasks.slice().sort(function(a,b){
      if(a.done !== b.done) return a.done ? 1 : -1;
      var ad = a.due || '9999', bd = b.due || '9999';
      if(ad !== bd) return ad < bd ? -1 : 1;
      return b.createdAt - a.createdAt;
    });
    list.innerHTML = sorted.map(function(t){
      var overdue = t.due && t.due < TODAY_KEY && !t.done;
      var dueLabel = '';
      if(t.due){
        var dd = new Date(t.due + 'T00:00:00');
        dueLabel = dd.toLocaleDateString(undefined, {month:'short', day:'numeric'});
      }
      var color = PRIO_COLORS[t.priority] || PRIO_COLORS.low;
      return '<div class="card" style="--card-accent:'+color+'" data-id="'+t.id+'">'
        + '<div class="check '+(t.done?'done':'')+'" data-action="toggle" data-id="'+t.id+'">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg></div>'
        + '<div class="card-body">'
        + '<div class="card-title '+(t.done?'done':'')+'">'+escapeHtml(t.title)+'</div>'
        + (t.notes ? '<div class="card-notes" data-action="expand">'+escapeHtml(t.notes)+'</div>' : '')
        + '<div class="meta-row"><span class="prio-dot prio-'+t.priority+'"></span>'
        + (dueLabel ? '<span class="due '+(overdue?'overdue':'')+'">'+dueLabel+(overdue?' · overdue':'')+'</span>' : '<span class="due">no due date</span>')
        + '</div></div>'
        + '<button class="del" data-action="delete-task" data-id="'+t.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M9 6V4h6v2m-8 0l1 14h8l1-14"/></svg></button>'
        + '</div>';
    }).join('');
  }

  /* ---------- habits ---------- */
  function last7Days(){
    var arr = [];
    for(var i=6;i>=0;i--){
      var d = new Date(TODAY);
      d.setDate(d.getDate()-i);
      arr.push(d);
    }
    return arr;
  }
  function streakFor(habit){
    var count=0, d=new Date(TODAY);
    if(!habit.history[fmtKey(d)]){ d.setDate(d.getDate()-1); }
    while(habit.history[fmtKey(d)]){
      count++;
      d.setDate(d.getDate()-1);
    }
    return count;
  }
  function renderHabits(){
    var list = document.getElementById('habitsList');
    if(data.habits.length === 0){
      list.innerHTML = '<div class="empty"><p class="e-title">No habits tracked</p><p class="e-body">Add one and check it off day by day to build a streak.</p></div>';
      return;
    }
    var days = last7Days();
    var sorted = data.habits.slice().sort(function(a,b){ return b.createdAt - a.createdAt; });
    list.innerHTML = sorted.map(function(h){
      var streak = streakFor(h);
      var dots = days.map(function(d){
        var key = fmtKey(d);
        var on = !!h.history[key];
        var isToday = key === TODAY_KEY;
        var label = d.toLocaleDateString(undefined, {weekday:'narrow'});
        return '<div class="dot '+(on?'on':'')+' '+(isToday?'today':'')+'" data-action="toggle-habit" data-id="'+h.id+'" data-day="'+key+'"><span class="dot-label">'+label+'</span></div>';
      }).join('');
      return '<div class="card habit-row" style="--card-accent:'+h.color+'" data-id="'+h.id+'">'
        + '<div class="habit-top"><div class="habit-name-row"><span class="habit-swatch"></span><div class="card-title">'+escapeHtml(h.title)+'</div></div>'
        + '<div style="display:flex; align-items:center; gap:8px;">'
        + '<div class="streak">'+(streak>0 ? '<b>'+streak+'d</b>' : '<span>no streak</span>')+'</div>'
        + '<button class="del" data-action="delete-habit" data-id="'+h.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M9 6V4h6v2m-8 0l1 14h8l1-14"/></svg></button>'
        + '</div></div>'
        + (h.notes ? '<div class="habit-notes" data-action="expand">'+escapeHtml(h.notes)+'</div>' : '')
        + '<div class="ribbon-wrap"><div class="ribbon">'+dots+'</div></div>'
        + '</div>';
    }).join('');
  }

  /* ---------- history ---------- */
  function activityMap(){
    var map = {};
    data.tasks.forEach(function(t){
      if(t.done && t.completedAt){
        var k = fmtKey(new Date(t.completedAt));
        map[k] = (map[k]||0) + 1;
      }
    });
    data.habits.forEach(function(h){
      Object.keys(h.history).forEach(function(k){
        if(h.history[k]) map[k] = (map[k]||0) + 1;
      });
    });
    return map;
  }

  function renderStats(){
    var grid = document.getElementById('statGrid');
    var totalDone = data.tasks.filter(function(t){ return t.done; }).length;
    var bestHabit = null, bestStreak = -1;
    data.habits.forEach(function(h){
      var s = streakFor(h);
      if(s > bestStreak){ bestStreak = s; bestHabit = h; }
    });
    var map = activityMap();
    var activeDays = 0;
    for(var i=0;i<7;i++){
      var d = new Date(TODAY); d.setDate(d.getDate()-i);
      if(map[fmtKey(d)]) activeDays++;
    }
    var tiles = [
      { num: totalDone, label:'Tasks completed all-time', bg:'rgba(76,154,106,0.12)', fg:'#4C9A6A' },
      { num: data.habits.length, label:'Habits being tracked', bg:'rgba(91,141,239,0.12)', fg:'#5B8DEF' },
      { num: bestHabit ? (bestStreak+'d') : '—', label: bestHabit ? ('Best streak · '+bestHabit.title) : 'Best streak', bg:'rgba(242,169,59,0.12)', fg:'#F2A93B' },
      { num: activeDays+'/7', label:'Active days this week', bg:'rgba(47,191,196,0.12)', fg:'#2FBFC4' }
    ];
    grid.innerHTML = tiles.map(function(t){
      return '<div class="stat-tile" style="--tile-bg:'+t.bg+'; --tile-fg:'+t.fg+'"><div class="stat-num">'+t.num+'</div><div class="stat-label">'+t.label+'</div></div>';
    }).join('');
  }

  function renderHeatmap(){
    var map = activityMap();
    var container = document.getElementById('heatmap');
    var WEEKS = 10;
    var start = new Date(TODAY);
    start.setDate(start.getDate() - (WEEKS*7 - 1));
    // align start to a Sunday
    start.setDate(start.getDate() - start.getDay());
    var html = '';
    for(var c=0;c<WEEKS+1;c++){
      html += '<div class="heat-col">';
      for(var r=0;r<7;r++){
        var d = new Date(start);
        d.setDate(d.getDate() + c*7 + r);
        var key = fmtKey(d);
        var count = map[key] || 0;
        var color = 'var(--surface-2)';
        if(count > 0){ color = multiStop(HEAT_STOPS, Math.min(count,4)/4); }
        var future = d > TODAY;
        html += '<div class="heat-cell" style="background:'+(future?'transparent':color)+'" title="'+key+': '+count+'"></div>';
      }
      html += '</div>';
    }
    container.innerHTML = html;
    for(var i=0;i<4;i++){
      var el = document.getElementById('lg'+i);
      if(el) el.style.background = i===0 ? 'var(--surface-2)' : multiStop(HEAT_STOPS, i/4 + 0.12);
    }
  }

  function renderHabitHistList(){
    var wrap = document.getElementById('habitHistList');
    var block = document.getElementById('habitHistBlock');
    if(data.habits.length === 0){
      block.style.display = 'none';
      return;
    }
    block.style.display = 'block';
    var days14 = [];
    for(var i=13;i>=0;i--){
      var d = new Date(TODAY); d.setDate(d.getDate()-i);
      days14.push(d);
    }
    wrap.innerHTML = data.habits.map(function(h){
      var strip = days14.map(function(d){
        var on = !!h.history[fmtKey(d)];
        return '<div class="hh-dot" style="background:'+(on ? h.color : 'var(--surface-2)')+'"></div>';
      }).join('');
      var s = streakFor(h);
      return '<div class="habit-hist-row"><span class="habit-swatch" style="background:'+h.color+'"></span>'
        + '<div class="hh-name">'+escapeHtml(h.title)+'</div>'
        + '<div class="hh-strip">'+strip+'</div>'
        + '<div class="hh-streak">'+(s>0 ? s+' day'+(s===1?'':'s') : '—')+'</div>'
        + '</div>';
    }).join('');
  }

  function renderHistory(){
    renderStats();
    renderHeatmap();
    renderHabitHistList();
  }

  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderAll(){
    renderHeader();
    renderTasks();
    renderHabits();
    renderHistory();
    renderRing();
  }

  /* ---------- tabs ---------- */
  var activeTab = 'tasks';
  document.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click', function(){
      activeTab = el.getAttribute('data-tab');
      document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t===el); });
      document.getElementById('tasksSection').classList.toggle('active', activeTab==='tasks');
      document.getElementById('habitsSection').classList.toggle('active', activeTab==='habits');
      document.getElementById('historySection').classList.toggle('active', activeTab==='history');
      document.getElementById('fab').style.display = activeTab === 'history' ? 'none' : 'flex';
      if(activeTab === 'history') renderHistory();
      haptic('light');
    });
  });

  /* ---------- list actions (delegated) ---------- */
  document.addEventListener('click', function(e){
    var expandable = e.target.closest('[data-action="expand"]');
    if(expandable){
      expandable.classList.toggle('expanded');
      return;
    }
    var toggle = e.target.closest('[data-action="toggle"]');
    if(toggle){
      var id = toggle.getAttribute('data-id');
      var t = data.tasks.find(function(x){ return x.id===id; });
      if(t){
        t.done = !t.done;
        t.completedAt = t.done ? Date.now() : null;
        saveData(); renderTasks(); renderRing();
        haptic(t.done ? 'success' : 'light');
      }
      return;
    }
    var delTask = e.target.closest('[data-action="delete-task"]');
    if(delTask){
      var idd = delTask.getAttribute('data-id');
      data.tasks = data.tasks.filter(function(x){ return x.id !== idd; });
      saveData(); renderTasks(); renderRing();
      haptic('light');
      return;
    }
    var togHabit = e.target.closest('[data-action="toggle-habit"]');
    if(togHabit){
      var hid = togHabit.getAttribute('data-id');
      var day = togHabit.getAttribute('data-day');
      var h = data.habits.find(function(x){ return x.id===hid; });
      if(h){
        if(h.history[day]) delete h.history[day];
        else h.history[day] = true;
        saveData(); renderHabits(); renderRing();
        haptic(h.history[day] ? 'success' : 'light');
      }
      return;
    }
    var delHabit = e.target.closest('[data-action="delete-habit"]');
    if(delHabit){
      var hidd = delHabit.getAttribute('data-id');
      data.habits = data.habits.filter(function(x){ return x.id !== hidd; });
      saveData(); renderHabits(); renderRing();
      haptic('light');
      return;
    }
  });

  /* ---------- add sheet ---------- */
  var sheet = document.getElementById('sheet');
  var backdrop = document.getElementById('backdrop');
  var titleInput = document.getElementById('titleInput');
  var notesInput = document.getElementById('notesInput');
  var dueInput = document.getElementById('dueInput');
  var taskFields = document.getElementById('taskFields');
  var sheetTitle = document.getElementById('sheetTitle');
  var selectedPriority = 'low';

  document.getElementById('prioRow').addEventListener('click', function(e){
    var pill = e.target.closest('.pill');
    if(!pill) return;
    selectedPriority = pill.getAttribute('data-p');
    document.querySelectorAll('#prioRow .pill').forEach(function(p){ p.classList.toggle('sel', p===pill); });
  });

  function openSheet(){
    titleInput.value = '';
    notesInput.value = '';
    dueInput.value = '';
    selectedPriority = 'low';
    document.querySelectorAll('#prioRow .pill').forEach(function(p){ p.classList.toggle('sel', p.getAttribute('data-p')==='low'); });
    taskFields.style.display = activeTab === 'habits' ? 'none' : 'block';
    sheetTitle.textContent = activeTab === 'habits' ? 'New habit' : 'New task';
    document.getElementById('saveBtn').textContent = activeTab === 'habits' ? 'Add Habit' : 'Add Task';
    backdrop.classList.add('show');
    sheet.classList.add('show');
    setTimeout(function(){ titleInput.focus(); }, 250);
  }
  function closeSheet(){
    backdrop.classList.remove('show');
    sheet.classList.remove('show');
    titleInput.blur();
  }

  document.getElementById('fab').addEventListener('click', function(){ haptic('light'); openSheet(); });
  document.getElementById('cancelBtn').addEventListener('click', closeSheet);
  backdrop.addEventListener('click', closeSheet);

  document.getElementById('saveBtn').addEventListener('click', function(){
    var title = titleInput.value.trim();
    var notes = notesInput.value.trim();
    if(!title){
      haptic('error');
      titleInput.focus();
      return;
    }
    if(activeTab === 'habits'){
      data.habits.push({ id: uid(), title: title, notes: notes, createdAt: Date.now(), history: {}, color: HABIT_COLORS[data.habits.length % HABIT_COLORS.length] });
      renderHabits();
    } else {
      data.tasks.push({
        id: uid(), title: title, notes: notes, priority: selectedPriority,
        due: dueInput.value || null, done: false, completedAt: null, createdAt: Date.now()
      });
      renderTasks();
    }
    saveData();
    renderRing();
    haptic('success');
    closeSheet();
  });

  if(tg && tg.BackButton){
    tg.onEvent('backButtonClicked', function(){
      if(sheet.classList.contains('show')) closeSheet();
    });
  }

  /* ---------- init ---------- */
  buildRing();
  loadData().then(renderAll);
})();
</script>
</body>
</html>
